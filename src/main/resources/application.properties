server.port=${PORT:8080}

# ---- Datasource ----
spring.datasource.url=jdbc:postgresql://localhost:5432/mindora_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=mindora_super_secret_key_minimum_32_characters_long
app.jwt.expiration=86400000

# ---- CORS (comma separated) ----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# ---- SQL init (seed data + knowledge base) ----
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql,classpath:knowledge_data.sql
spring.jpa.defer-datasource-initialization=true

# ---- Logging ----
logging.level.org.apache.catalina.core.AprLifecycleListener=OFF
logging.level.root=INFO
logging.level.com.mindora=DEBUG

# ---- Gemini AI (RAG) ----
# Lay key mien phi tai: https://aistudio.google.com/apikey
# Key duoc doc tu bien moi truong GEMINI_API_KEY (dat trong file .env, KHONG commit len git)
# Neu chua co key, Dora van hoat dong voi fallback response tu knowledge base
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
gemini.max.tokens=1024
